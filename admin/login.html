<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSSPL Admin Login</title>
  <link rel="icon" type="image/x-icon" href="../favicon/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #ffbc01;
      --primary-hover: #e0a500;
      --text-white: #ffffff;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at 50% 50%, #111827, var(--bg-dark));
      color: var(--text-white);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .background-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('../DSSPL-logo.png') no-repeat center center;
      background-size: cover;
      opacity: 0.03;
      filter: blur(10px);
      z-index: 1;
    }

    .login-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      z-index: 2;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-area img {
      height: 70px;
      margin-bottom: 10px;
    }

    .logo-area h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo-area p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      font-size: 18px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-white);
      font-family: inherit;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 10px rgba(255, 188, 1, 0.15);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-login:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 188, 1, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .guest-back {
      text-align: center;
      margin-top: 1.5rem;
    }

    .guest-back a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .guest-back a:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="background-overlay"></div>

  <div class="login-container">
    <div class="logo-area">
      <img src="../DSSPL_LOGO.png" alt="DSSPL Logo">
      <h1>DSSPL Admin Panel</h1>
      <p>Management & Realtime Scoring Portal</p>
    </div>

    <div class="error-msg" id="errorBlock">
      <i class="ri-error-warning-line"></i>
      <span id="errorMessage">Invalid credentials</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <i class="ri-user-line"></i>
          <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="ri-lock-line"></i>
          <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span>Sign In</span>
        <i class="ri-arrow-right-line"></i>
      </button>
    </form>

    <div class="guest-back">
      <a href="../index.html"><i class="ri-arrow-left-line"></i> Back to Homepage</a>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem("dsspl_token")) {
      window.location.href = "index.html";
    }

    const loginForm = document.getElementById("loginForm");
    const errorBlock = document.getElementById("errorBlock");
    const errorMessage = document.getElementById("errorMessage");
    const loginBtn = document.getElementById("loginBtn");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      
      // Reset UI
      errorBlock.style.display = "none";
      loginBtn.disabled = true;
      loginBtn.querySelector("span").textContent = "Signing In...";

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Login failed");
        }

        // Save Auth state
        localStorage.setItem("dsspl_token", data.token);
        localStorage.setItem("dsspl_user", JSON.stringify(data.user));

        // Redirect
        window.location.href = "index.html";
      } catch (err) {
        errorMessage.textContent = err.message;
        errorBlock.style.display = "flex";
        
        loginBtn.disabled = false;
        loginBtn.querySelector("span").textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
